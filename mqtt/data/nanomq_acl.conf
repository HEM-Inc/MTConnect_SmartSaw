rules = [
    # # Allow MQTT client using username "mtconnect" to pubsub to "mtconnect/#" topics
    {"permit": "allow", "username": "mtconnect", "action": "pubsub", "topics": ["mtconnect/#"]}

    # # Allow MQTT client using username "hemsaw" to pubsub to "ods/#" topics
    {"permit": "allow", "username": "hemsaw", "action": "pubsub", "topics": ["ods/#"]}

    # # Allow "All Users/anonymous" publish/subscribe to "mtconnect/#" Topics and subscribe to "$SYS/#", "ods/#" Topics
    {"permit": "allow", "username": "#", "action": "pubsub", "topics": ["mtconnect/#"]}
    {"permit": "allow", "username": "#", "action": "subscribe", "topics": ["$SYS/#", "ods/#"]}

    # # Deny "All Users" subscribe to "$SYS/#" "#" Topics (uncomment when acl is implemented)
    {"permit": "deny", "username": "#", "action": "subscribe", "topics": ["$SYS/#", "#"]}

    # # Allow any other publish/subscribe operation
    {"permit": "allow"}

    # # Deny any other publish/subscribe operation
    # {"permit": "deny"}
]